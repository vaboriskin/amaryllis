services:
  postgres:
    image: postgres:16-alpine
    container_name: amaryllis-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-amaryllis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-amaryllis}
      - POSTGRES_DB=${POSTGRES_DB:-amaryllis}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amaryllis} -d ${POSTGRES_DB:-amaryllis}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - amaryllis-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amaryllis-backend
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_TO=${EMAIL_TO}
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - amaryllis-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: amaryllis-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - amaryllis-network

networks:
  amaryllis-network:
    driver: bridge

volumes:
  postgres_data:
